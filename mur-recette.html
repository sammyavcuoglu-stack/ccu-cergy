  <style>
    :root {
      --bg:     #1e2330;
      --bg2:    #252b3b;
      --bg3:    #2d3447;
      --border: #353d52;
      --text:   #e8eaf0;
      --muted:  #6b7494;
      --green:  #2ecc71;
      --orange: #e67e22;
      --red:    #e74c3c;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; overflow: hidden; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Barlow', sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
      padding: 0.6rem 1rem;
      gap: 0.5rem;
    }

    /* ── HEADER ── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      flex-shrink: 0;
    }
    .header-left { display: flex; flex-direction: column; gap: 0.05rem; flex-shrink: 0; }
    .projet-nom {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 900; font-size: 0.7rem;
      letter-spacing: 0.14em; text-transform: uppercase;
      color: var(--muted);
    }
    .app-nom {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 700; font-size: 1.2rem;
      letter-spacing: 0.1em; text-transform: uppercase;
      color: white;
    }
    .live-dot {
      width: 9px; height: 9px;
      background: var(--green); border-radius: 50%;
      flex-shrink: 0;
      animation: livepulse 2.5s ease-in-out infinite;
    }
    .header-clock {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 700; font-size: 2.2rem;
      color: white; letter-spacing: 0.05em;
    }
    @keyframes livepulse {
      0%,100% { opacity:1; transform:scale(1); }
      50%      { opacity:.3; transform:scale(.7); }
    }

    /* ── LAYOUT PRINCIPAL ── */
    .main-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.5rem;
      flex: 1;
      min-height: 0;
    }

    /* Colonne gauche : état trafic + retards empilés */
    .col-left {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      min-height: 0;
    }

    /* Colonne droite : SNCF + RATP empilés */
    .col-right {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      min-height: 0;
    }

    /* ── PANNEAU GÉNÉRIQUE ── */
    .panel {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    .panel-title {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 700; font-size: 1.1rem;
      letter-spacing: 0.1em; text-transform: uppercase;
      color: white; text-align: center;
      padding: 0.45rem 1rem;
      background: var(--bg3);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .panel-body { padding: 0.6rem 1rem; flex: 1; overflow: hidden; }

    /* ── TIMER PANNEAU ── */
    .panel-title-wrap { display: flex; flex-direction: column; gap: 0; }
    .panel-title-row { display: flex; align-items: center; justify-content: space-between; }
    .panel-timer {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 600; font-size: 0.9rem;
      color: var(--muted); min-width: 2rem; text-align: right;
    }
    .panel-timer.urgent { color: var(--orange); }


    /* ── ÉTAT DU TRAFIC ── */
    .panel-trafic {
      flex-shrink: 0;
    }
    .trafic-body {
      padding: 0.7rem 1rem;
      display: flex; align-items: center; justify-content: center;
    }
    .trafic-capsule {
      display: flex; align-items: center; justify-content: center;
      padding: 1.2vw 4vw;
      border-radius: 2vw;
      transition: background 0.5s;
    }
    .trafic-box.fluide       .trafic-capsule { background: var(--green); }
    .trafic-box.retards      .trafic-capsule { background: #8e6020; }
    .trafic-box.perturbe     .trafic-capsule { background: var(--orange); }
    .trafic-box.tres-perturbe .trafic-capsule { background: var(--red); }
    .trafic-box.interrompu   .trafic-capsule { background: var(--red); }
    .trafic-label {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 900; font-size: 6.5vw;
      color: white; letter-spacing: 0.05em; text-transform: uppercase;
    }

    /* ── RETARDS (prend tout l'espace restant gauche) ── */
    .panel-retards {
      flex: 1;
      min-height: 0;
    }
    .delay-cols {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0 2rem;
      height: 100%;
      align-content: start;
    }

    /* ── MODE SCÉNARIO : layout 3 lignes ── */
    .main-grid.has-scenario {
      grid-template-columns: 1fr;
      grid-template-rows: auto auto 1fr;
    }
    .main-grid.has-scenario .col-left {
      flex-direction: row;
      gap: 0.5rem;
    }
    .main-grid.has-scenario .col-right {
      display: none;
    }
    .main-grid.has-scenario .panel-trafic {
      flex: 0 0 35%;
    }
    .main-grid.has-scenario .panel-retards {
      flex: 1;
    }
    .main-grid.has-scenario .panel-infographie {
      display: flex !important;
      flex-direction: column;
      flex: 1;
      min-height: 0;
    }
    /* Bulle trafic compacte en mode scénario */
    .main-grid.has-scenario .trafic-capsule { padding: 0.3rem 0.5rem; }
    .main-grid.has-scenario .trafic-label   { font-size: clamp(0.9rem, 2.2vw, 2.8vw); letter-spacing: 0.02em; }
    .main-grid.has-scenario .panel-trafic   { flex: 0 0 42%; }

    /* Police compacte pour retards en mode scénario */
    .main-grid.has-scenario .delay-row {
      padding: 0.15rem 0;
      border-bottom-width: 1px;
    }
    .main-grid.has-scenario .delay-mission { font-size: clamp(0.7rem, 1.8vw, 2.2vw) !important; }
    .main-grid.has-scenario .delay-mins    { font-size: clamp(0.65rem, 1.6vw, 2vw) !important; }
    .delay-row {
      display: flex; align-items: baseline; gap: 0.6rem;
      padding: 0.6rem 0;
      border-bottom: 2px solid var(--border);
      flex-wrap: nowrap;
      min-width: 0;
    }
    .delay-row:last-child { border-bottom: none; }
    .delay-mission {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 800; font-size: 4.5vw;
      color: white; letter-spacing: 0.03em;
      white-space: nowrap; flex-shrink: 0;
    }
    .delay-mins {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 700; font-size: 4vw;
      white-space: nowrap; flex-shrink: 0;
    }
    .delay-mins.orange { color: var(--orange); }
    .delay-mins.red    { color: var(--red); }
    .no-delay {
      display: flex; align-items: center; justify-content: center;
      height: 100%; flex-direction: column; gap: 1rem;
      color: var(--muted); font-size: 2.5vw;
    }
    .no-delay-dot {
      width: 20px; height: 20px;
      background: var(--green); border-radius: 50%;
      animation: livepulse 2s infinite;
    }
    /* Animation nouveau train */
    @keyframes newTrain {
      from { background: rgba(46,204,113,0.15); }
      to   { background: transparent; }
    }
    .delay-row.new { animation: newTrain 2s ease-out forwards; }

    /* ── COLONNE DROITE masquée si aucun message ── */
    .col-right { transition: opacity 0.5s; }
    

    /* Quand col-right masquée, col-left prend tout l'espace */
    .main-grid.no-comm {
      grid-template-columns:1fr 1fr;
    }

    /* ── COMMUNICATION (droite) ── */
    .panel-comm {
      flex: 1;
      min-height: 0;
    }
    .comm-source-label {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 700; font-size: 1.1vw;
      letter-spacing: 0.12em; text-transform: uppercase;
      color: var(--muted); margin-bottom: 0.4rem;
    }
    .comm-source-label.sncf { color: #e8a020; }
    .comm-source-label.ratp { color: #6b9fe4; }
    .comm-msg {
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.7rem 1rem;
      font-size: clamp(0.6rem, 1.2vw, 1rem);
      line-height: 1.45;
      color: var(--text);
      overflow: hidden;
      display: -webkit-box;
      -webkit-line-clamp: 7;
      -webkit-box-orient: vertical;
    }
    .comm-msg.perturbe   { border-left: 5px solid var(--orange); color: #f0a870; }
    .comm-msg.interrompu { border-left: 5px solid var(--red);    color: #f08080; }
    .comm-time {
      font-size: 1vw; color: var(--muted);
      margin-top: 0.3rem; text-align: right;
    }
    .no-comm {
      display: flex; align-items: center; justify-content: center;
      padding: 1rem; color: var(--muted); font-size: 1.2vw;
    }

    /* ── CARROUSEL ── */
    .carousel-wrap { overflow: hidden; position: relative; }
    .carousel-slide { display: none; animation: slideDown 0.6s ease; }
    .carousel-slide.active { display: block; }
    @keyframes slideDown {
      from { opacity: 0; transform: translateY(-12px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .carousel-dots {
      display: flex; justify-content: center;
      gap: 0.4rem; margin-top: 0.4rem;
    }
    .carousel-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--border); transition: background 0.3s;
    }
    .carousel-dot.active { background: var(--muted); }

    /* ── INFOGRAPHIE (bas, caché par défaut) ── */
    .panel-infographie {
      flex-shrink: 0;
      display: none;
      overflow: hidden;
    }
    .panel-infographie.visible { display: flex; flex-direction: column; }
    .infographie-img {
      width: 100%; height: auto; display: block;
      border-radius: 0 0 10px 10px;
    }

    /* ── TIMESTAMP masqué ── */
    .timestamp { display: none; }

    /* ── CREDITS (coin discret) ── */
    .credits {
      position: fixed; bottom: 4px; right: 8px;
      font-size: 0.5rem; color: rgba(107,116,148,0.4);
      letter-spacing: 0.03em; z-index: 10;
      pointer-events: none;
    }

    .error-box {
      background: rgba(231,76,60,.1); border: 1px solid rgba(231,76,60,.3);
      border-radius: 8px; padding: 1rem; font-size: 1rem; color: #e74c3c;
    }

    <div class="panel panel-retards">

  <!-- INFOGRAPHIE (dans la grille, cachée par défaut) -->

<script>
  var PROXY        = 'https://rera-proxy.sammy-avcuoglu.workers.dev/proxy';
  var STOPS        = [
    'STIF:StopArea:SP:46647:',  // Achères Grand Cormier
    'STIF:StopArea:SP:44559:',  // Cergy Prefecture
    'STIF:StopArea:SP:43082:'   // Houilles-Carrieres sur Seine
  ];
  var LINE         = 'STIF:Line::C01742:';
  var LINE_NAVITIA = 'line:IDFM:C01742';
  var timer        = null;
  var retardsParGare = {};
  var prevMissions = {};  // pour détecter nouveaux trains

  // ── HORLOGE ──────────────────────────────────────────────
  function updateClock() {
    var now = new Date();
    var h = String(now.getHours()).padStart(2,'0');
    var m = String(now.getMinutes()).padStart(2,'0');
    var s = String(now.getSeconds()).padStart(2,'0');
    document.getElementById('clock').textContent = h + ':' + m + ':' + s;
  }
  setInterval(updateClock, 1000);
  updateClock();

  // ── HELPERS ──────────────────────────────────────────────
  function esc(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }
  function decodeHtml(str) {
    var txt = document.createElement('textarea');
    txt.innerHTML = str;
    return txt.value;
  }
  function getMsgClass(txt) {
    var low = txt.toLowerCase();
    var isInt = low.indexOf('interrompu') !== -1;
    var isTrv = low.indexOf('travaux') !== -1;
    if (isInt && !isTrv) return 'interrompu';
    if (isInt && isTrv)  return 'perturbe';
    if (low.indexOf('perturbé') !== -1 || low.indexOf('perturbe') !== -1) return 'perturbe';
    return '';
  }

  // ── FETCH ─────────────────────────────────────────────────
  function fetchData() {
    retardsParGare = {};
    var promises = STOPS.map(function(stop) {
      return fetch(PROXY + '/stop-monitoring?MonitoringRef=' + encodeURIComponent(stop), {
        headers: { 'Accept': 'application/json' }
      })
      .then(function(r) { return r.json(); })
      .then(function(d) { retardsParGare[stop] = d; })
      .catch(function() { retardsParGare[stop] = null; });
    });
    Promise.all(promises).then(function() { renderRetards(); });

    fetch(PROXY + '/general-message?LineRef=' + encodeURIComponent(LINE), {
      headers: { 'Accept': 'application/json' }
    })
    .then(function(r) { return r.json(); })
    .then(function(d) { renderTraficRATP(d); })
    .catch(function() {});

    fetch(PROXY + '/v2/navitia/line_reports/lines/' + encodeURIComponent(LINE_NAVITIA) + '/line_reports', {
      headers: { 'Accept': 'application/json' }
    })
    .then(function(r) { return r.json(); })
    .then(function(d) { renderTraficSNCF(d); })
    .catch(function() {});

    document.getElementById('ts').textContent =
      'Actualisé à ' + new Date().toLocaleTimeString('fr-FR',
        { hour:'2-digit', minute:'2-digit', second:'2-digit' });

    demarrerTimerComm();

    clearTimeout(timer);
    timer = setTimeout(fetchData, 20000);
  }

  // ── RETARDS ───────────────────────────────────────────────
  function renderRetards() {
    var byMission = {};
    for (var stop in retardsParGare) {
      var data = retardsParGare[stop];
      var visits = [];
      try { visits = data.Siri.ServiceDelivery.StopMonitoringDelivery[0].MonitoredStopVisit || []; } catch(e) {}
      for (var i = 0; i < visits.length; i++) {
        var v    = visits[i];
        var call = (v.MonitoredVehicleJourney && v.MonitoredVehicleJourney.MonitoredCall) || {};
        var j2   = v.MonitoredVehicleJourney || {};
        var dept = call.ExpectedDepartureTime || call.AimedDepartureTime;
        var aimed = call.AimedDepartureTime;
        if (!dept || !aimed) continue;
        var delayMins = Math.round((new Date(dept) - new Date(aimed)) / 60000);
        if (delayMins <= 3) continue;
        var mission = '';
        try { mission = j2.VehicleJourneyName[0].value; } catch(e) {}
        if (!mission) try { mission = j2.JourneyNote[0].value; } catch(e) {}
        if (!mission) continue;
        if (!byMission[mission] || delayMins > byMission[mission]) {
          byMission[mission] = delayMins;
        }
      }
    }

    var retards = [];
    for (var m in byMission) retards.push({ mission: m, delay: byMission[m] });
    retards.sort(function(a, b) { return b.delay - a.delay; });

    // Mettre à jour état trafic si retards sans perturbation
    updateTraficRetards(retards.length > 0);

    var el = document.getElementById('panel-retards');
    if (!retards.length) {
      prevMissions = {};
      el.innerHTML = '<div class="no-delay"><div class="no-delay-dot"></div>Aucun retard détecté</div>';
      return;
    }

    var mid  = Math.ceil(retards.length / 2);
    var col1 = retards.slice(0, mid);
    var col2 = retards.slice(mid);

    function buildCol(arr) {
      var h = '';
      for (var k = 0; k < arr.length; k++) {
        var cls  = arr[k].delay >= 10 ? 'red' : 'orange';
        var isNew = !prevMissions[arr[k].mission] ? ' new' : '';
        h += '<div class="delay-row' + isNew + '">';
        h += '<div class="delay-mission">' + esc(arr[k].mission) + '</div>';
        h += '<div class="delay-mins ' + cls + '">+' + arr[k].delay + ' min</div>';
        h += '</div>';
      }
      return h;
    }

    // Mémoriser missions actuelles
    var newPrev = {};
    for (var n = 0; n < retards.length; n++) newPrev[retards[n].mission] = true;
    prevMissions = newPrev;

    el.innerHTML='<div style="display:flex;flex-direction:column;">'+buildCol(col1)+'</div>';var elR=document.getElementById('panel-retards-right');if(elR){elR.innerHTML=col2.length?'<div style="display:flex;flex-direction:column;">'+buildCol(col2)+'</div>':'<div style="color:var(--muted);display:flex;align-items:center;justify-content:center;height:100%;">—</div>';}var n=retards.length;var vwM=n<=2?9:n<=4?7:n<=6?5.5:4;document.querySelectorAll('.delay-mission').forEach(function(e){e.style.fontSize=vwM+'vw';});document.querySelectorAll('.delay-mins').forEach(function(e){e.style.fontSize=(vwM*0.88)+'vw';});
  }

  // ── ÉTAT TRAFIC ───────────────────────────────────────────
  var traficSNCFState = 'fluide'; // état venant de SNCF
  var hasRetards = false;

  function updateTraficRetards(retardsActifs) {
    hasRetards = retardsActifs;
    applyTraficState();
  }

  function applyTraficState() {
    var box   = document.getElementById('trafic-box');
    var label = document.getElementById('trafic-label');
    box.className = 'trafic-box';
    if (traficSNCFState === 'interrompu') {
      box.classList.add('interrompu');
      label.textContent = 'Interrompu';
    } else if (traficSNCFState === 'tres-perturbe') {
      box.classList.add('tres-perturbe');
      label.textContent = 'Très perturbé';
    } else if (traficSNCFState === 'perturbe') {
      box.classList.add('perturbe');
      label.textContent = 'Perturbé';
    } else if (hasRetards) {
      box.classList.add('retards');
      label.textContent = 'Retards';
    } else {
      box.classList.add('fluide');
      label.textContent = 'Fluide';
    }
    if (typeof checkFinService === 'function') checkFinService();
  }

  // ── CARROUSEL ─────────────────────────────────────────────
  var carousels = {};
  var commHasMessages = { sncf: false, ratp: false };

  function updateCommColumnVisibility(){return;
    var colRight = document.querySelector('.col-right');
    var mainGrid = document.querySelector('.main-grid');
    var hasAny = commHasMessages.sncf || commHasMessages.ratp;
    if (hasAny) {
      colRight.classList.remove('hidden');
      mainGrid.classList.remove('no-comm');
    } else {
      colRight.classList.add('hidden');
      mainGrid.classList.add('no-comm');
    }
  }

  function startCarousel(panelId, items) {
    if (carousels[panelId]) { clearInterval(carousels[panelId].timer); delete carousels[panelId]; }
    if (items.length <= 1) return;
    var idx = 0;
    function showSlide(i) {
      var slides = document.querySelectorAll('#' + panelId + ' .carousel-slide');
      for (var s = 0; s < slides.length; s++) slides[s].classList.remove('active');
      if (slides[i]) slides[i].classList.add('active');
      var dots = document.querySelectorAll('#' + panelId + ' .carousel-dot');
      for (var d = 0; d < dots.length; d++) dots[d].classList.remove('active');
      if (dots[i]) dots[i].classList.add('active');
    }
    showSlide(0);
    carousels[panelId] = { timer: setInterval(function() { idx = (idx + 1) % items.length; showSlide(idx); }, 15000) };
  }

  function renderCarousel(panelId, items) {
    if (carousels[panelId]) { clearInterval(carousels[panelId].timer); delete carousels[panelId]; }
    var comm = document.getElementById(panelId);
    // Tracker présence de messages
    var key = panelId === 'panel-comm-sncf' ? 'sncf' : 'ratp';
    commHasMessages[key] = items.length > 0;
    updateCommColumnVisibility();
    if (!items.length) {
      comm.innerHTML = '<div class="no-comm">Aucun message en cours.</div>';
      return;
    }
    if (items.length === 1) {
      var timeHtml = items[0].time ? '<div class="comm-time">' + esc(items[0].time) + '</div>' : '';
      comm.innerHTML = '<div class="comm-msg ' + items[0].cls + '">' + items[0].html + timeHtml + '</div>';
      return;
    }
    var html = '<div class="carousel-wrap">';
    for (var i = 0; i < items.length; i++) {
      var timeHtml2 = items[i].time ? '<div class="comm-time">' + esc(items[i].time) + '</div>' : '';
      html += '<div class="carousel-slide' + (i === 0 ? ' active' : '') + '">';
      html += '<div class="comm-msg ' + items[i].cls + '">' + items[i].html + timeHtml2 + '</div>';
      html += '</div>';
    }
    html += '</div><div class="carousel-dots">';
    for (var j = 0; j < items.length; j++) {
      html += '<div class="carousel-dot' + (j === 0 ? ' active' : '') + '"></div>';
    }
    html += '</div>';
    comm.innerHTML = html;
    startCarousel(panelId, items);
  }

  // ── RATP ──────────────────────────────────────────────────
  function renderTraficRATP(data) {
    var msgs = [];
    try { msgs = data.Siri.ServiceDelivery.GeneralMessageDelivery[0].InfoMessage || []; } catch(e) {}
    var items = [];
    for (var i = 0; i < msgs.length; i++) {
      var body = '';
      try { body = msgs[i].Content.Message[0].MessageText.value; } catch(e) {}
      if (!body) continue;
      // Heure de publication
      var pubTime = '';
      try {
        var raw = msgs[i].RecordedAtTime || msgs[i].ValidUntilTime || '';
        if (raw) pubTime = 'Publié à ' + new Date(raw).toLocaleTimeString('fr-FR', {hour:'2-digit', minute:'2-digit'});
      } catch(e) {}
      items.push({ cls: getMsgClass(body), html: esc(body), time: pubTime });
    }
    renderCarousel('panel-comm-ratp', items);
  }

  // ── SNCF ──────────────────────────────────────────────────
  function renderTraficSNCF(data) {
    var disruptions = [];
    try { disruptions = data.disruptions || []; } catch(e) {}

    var hasInterrompu   = false;
    var hasTresPerturbe = false;
    var hasPerturbe     = false;
    var messages        = [];

    for (var i = 0; i < disruptions.length; i++) {
      var d = disruptions[i];
      // Ignorer ascenseurs
      var tags = d.tags || [];
      var isAscenseur = false;
      for (var t = 0; t < tags.length; t++) { if (tags[t] === 'Ascenseur') { isAscenseur = true; break; } }
      if (isAscenseur) continue;

      // Ignorer perturbations terminées
      var status = (d.status || '').toLowerCase();
      if (status === 'past') continue;

      var titre = '', texte = '';
      var msgs = d.messages || [];
      for (var m = 0; m < msgs.length; m++) {
        var ch = (msgs[m].channel && msgs[m].channel.name) || '';
        if (ch === 'titre' && !titre) titre = msgs[m].text || '';
        if (ch === 'moteur' && !texte) {
          var raw = (msgs[m].text || '').replace(/<[^>]+>/g, ' ');
          texte = decodeHtml(raw).replace(/\s+/g, ' ').trim();
        }
      }
      var affichage = texte || titre;
      if (!affichage) continue;

      // Heure de publication
      var pubTime = '';
      try {
        var updated = d.updated_at || d.application_periods && d.application_periods[0] && d.application_periods[0].begin || '';
        if (updated) pubTime = 'Publié à ' + new Date(updated).toLocaleTimeString('fr-FR', {hour:'2-digit', minute:'2-digit'});
      } catch(e) {}

      messages.push({ titre: titre, texte: affichage, cause: d.cause || '', status: status, time: pubTime });

      // Logique état trafic
      var low = affichage.toLowerCase();
      var isInterrompu   = low.indexOf('interrompu') !== -1;
      var isTravaux      = low.indexOf('travaux') !== -1;
      var isTresPerturbe = low.indexOf('très perturbé') !== -1 || low.indexOf('tres perturbe') !== -1;
      var isPerturbe     = low.indexOf('perturbé') !== -1 || low.indexOf('perturbe') !== -1;

      if (isInterrompu && isTravaux) continue;
      if (isTravaux && !isInterrompu) continue;

      if (isInterrompu)        hasInterrompu   = true;
      else if (isTresPerturbe) hasTresPerturbe = true;
      else if (isPerturbe)     hasPerturbe     = true;
      else                     hasPerturbe     = true;
    }

    // Mettre à jour état SNCF
    if (hasInterrompu)        traficSNCFState = 'interrompu';
    else if (hasTresPerturbe) traficSNCFState = 'tres-perturbe';
    else if (hasPerturbe)     traficSNCFState = 'perturbe';
    else                      traficSNCFState = 'fluide';
    applyTraficState();

    // Priorité active : si au moins 1 active → n'afficher que les active
    var hasActive = false;
    for (var a = 0; a < messages.length; a++) { if (messages[a].status === 'active') { hasActive = true; break; } }
    var filtered = hasActive ? messages.filter(function(x) { return x.status === 'active'; }) : messages;

    // Déduplication
    var seenTextes = {};
    var items = [];
    for (var k = 0; k < filtered.length; k++) {
      var key = filtered[k].texte.trim();
      if (seenTextes[key]) continue;
      seenTextes[key] = true;
      var cause2 = filtered[k].cause.toLowerCase();
      var txt2   = filtered[k].texte.toLowerCase();
      var c = '';
      if (txt2.indexOf('interrompu') !== -1 && cause2 !== 'travaux') c = 'interrompu';
      else if (cause2 === 'travaux') c = 'perturbe';
      else c = 'perturbe';
      var h = '';
      if (filtered[k].titre) h += '<strong>' + esc(filtered[k].titre) + '</strong><br>';
      h += esc(filtered[k].texte);
      items.push({ cls: c, html: h, time: filtered[k].time });
    }
    renderCarousel('panel-comm-sncf', items);

    // Vérifier scénarios infographie
    var allTexts = [];
    for (var sc = 0; sc < filtered.length; sc++) allTexts.push(filtered[sc].texte);
    checkScenarios(allTexts);
  }

  function checkScenarios(messages) {
    // Chercher si un message actif déclenche un scénario
    var matched = null;
    for (var s = 0; s < SCENARIOS.length; s++) {
      var sc = SCENARIOS[s];
      for (var m = 0; m < messages.length; m++) {
        var low = messages[m].toLowerCase();
        // Vérifier mot obligatoire
        if (sc.require && low.indexOf(sc.require) === -1) continue;
        // Vérifier tous les mots clés
        var allMatch = true;
        for (var k = 0; k < sc.keywords.length; k++) {
          if (low.indexOf(sc.keywords[k]) === -1) { allMatch = false; break; }
        }
        if (allMatch) { matched = sc; break; }
      }
      if (matched) break;
    }

    var panel = document.getElementById('panel-infographie');
    var img   = document.getElementById('infographie-img');
    var title = document.getElementById('infographie-title');

    var mainGrid = document.querySelector('.main-grid');
    if (matched) {
      img.src = matched.img;
      title.textContent = matched.title;
      panel.style.display = 'flex';
      panel.style.flexDirection = 'column';
      mainGrid.classList.add('has-scenario');
    } else {
      panel.style.display = 'none';
      img.src = '';
      mainGrid.classList.remove('has-scenario');
    }
  }

  // ── TIMER VISUEL PANNEAU SNCF ──
  var commStart = null, commRAF = null;
  function demarrerTimerComm() {
    commStart = Date.now();
    if (commRAF) cancelAnimationFrame(commRAF);
    function tick() {
      var elapsed = Date.now() - commStart;
      var pct = Math.min(elapsed / 20000, 1);
      var reste = Math.ceil((20000 - elapsed) / 1000);
      if (reste < 0) reste = 0;
      ['sncf','ratp'].forEach(function(id) {
        var tmr = document.getElementById('timer-'+id);
        if (tmr) { tmr.textContent = reste+'s'; tmr.classList.toggle('urgent', reste <= 5); }
      });
      if (pct < 1) commRAF = requestAnimationFrame(tick);
    }
    requestAnimationFrame(tick);
  }

  fetchData();

<script>
// ── OPERA ACTU — OVERLAY PLEIN ÉCRAN ─────────────────────────────────────
var WORKER_ACTU  = 'https://rera-proxy.sammy-avcuoglu.workers.dev';
var actuListe    = [];
var actuIndex    = 0;
var actuTimer    = null;
var actuIncident = false;
var DUREE_FLUIDE = 30;   // secondes entre deux passages du carrousel

function actuChargerListe() {
  fetch(WORKER_ACTU + '/actu/liste')
    .then(function(r) { return r.json(); })
    .then(function(data) {
      actuListe = (data || []).filter(function(img) { return img.actif; });
      if (!actuIncident && actuListe.length > 0) actuDemarrer();
    })
    .catch(function() {});
  setTimeout(actuChargerListe, 120000); // recharge toutes les 2 min
}

function actuDemarrer() {
  actuIndex = 0;
  actuAfficherImage();
}

function estFinDeService() {
  var h = new Date().getHours();
  return (h >= 2 && h < 4);
}

function actuAfficherImage() {
  if (actuIncident || actuListe.length === 0) return;
  if (estFinDeService()) {
    // Entre 2h et 4h : fin de service prioritaire, on recheck dans 5 min
    document.getElementById('overlay-actu').style.display = 'none';
    actuTimer = setTimeout(function() {
      if (!actuIncident) actuAfficherImage();
    }, 300000);
    return;
  }
  var epinglee = null;
  for (var e = 0; e < actuListe.length; e++) {
    if (actuListe[e].epingle) { epinglee = actuListe[e]; break; }
  }

  var img   = epinglee ? epinglee : actuListe[actuIndex];
  var duree = epinglee ? (img.duree || 10) * 1000 : (img.duree || 10) * 1000;
  var overlay = document.getElementById('overlay-actu');
  var imgEl   = document.getElementById('actu-img');
  var barre   = document.getElementById('actu-barre');
  var compteur = document.getElementById('actu-compteur');

  overlay.style.display = 'flex';
  imgEl.style.opacity = '0';
  imgEl.src = WORKER_ACTU + '/actu/image/' + encodeURIComponent(img.filename);
  imgEl.onload = function() { imgEl.style.opacity = '1'; };

  // Épinglée : pas de compteur, barre infinie
  if (epinglee) {
    compteur.textContent = '📌 En diffusion';
    barre.style.transition = 'none';
    barre.style.width = '100%';
  } else {
    compteur.textContent = (actuIndex + 1) + ' / ' + actuListe.length;
    barre.style.transition = 'none';
    barre.style.width = '0%';
    setTimeout(function() {
      barre.style.transition = 'width ' + (duree / 1000) + 's linear';
      barre.style.width = '100%';
    }, 50);
  }

  actuTimer = setTimeout(function() {
    if (!epinglee) {
      actuIndex++;
      if (actuIndex >= actuListe.length) actuIndex = 0;
    }
    actuAfficherImage();
  }, duree);
}

function actuStopperPourIncident() {
  actuIncident = true;
  if (actuTimer) clearTimeout(actuTimer);
  document.getElementById('overlay-actu').style.display = 'none';
}

function actuReprendre() {
  actuIncident = false;
  if (actuListe.length > 0) {
    actuIndex = 0;
    actuAfficherImage();
  }
}

// Hooker checkScenarios pour détecter les incidents
var _origCheckScenarios = checkScenarios;
checkScenarios = function(messages) {
  _origCheckScenarios(messages);
  var panel = document.getElementById('panel-infographie');
  var isIncident = panel && panel.style.display !== 'none';
  if (isIncident && !actuIncident) actuStopperPourIncident();
  else if (!isIncident && actuIncident) actuReprendre();
};

// Démarrage au chargement
actuChargerListe();
</script>

<script>
  // ── OVERLAY FIN DE SERVICE 02h00-04h00 ──
  function checkFinService() {
    var now = new Date();
    var h = now.getHours();
    var estNuit = (h >= 2 && h < 4);
    var estFluide = (traficSNCFState === 'fluide' && !hasRetards);
    var overlay = document.getElementById('overlay-fin-service');
    if (estNuit && estFluide) {
      overlay.classList.add('visible');
    } else {
      overlay.classList.remove('visible');
    }
  }
  setInterval(checkFinService, 30000);
</script>
